                desc: '페이지 레이아웃이 선화처럼 여백으로 의경을 자아내며 「공(空)」의 지혜를 암시.',
                tags: ['선의', '수묵 여백', '반야 사상'],
                isNew: false,
                cover: 'P01_封面.svg'
            },
            {
                id: 'ppt169_像素风_git_introduction',
                title: 'Git 입문 완전 가이드',
                pages: 10,
                style: 'creative',
                styleName: '픽셀 레트로 게임 스타일',
                desc: '레트로 픽셀 게임 스타일. 「세이브 포인트」 메타포로 버전 관리 개념을 설명.',
                tags: ['픽셀 아트', '네온 계열', '게임 감성'],
                isNew: false,
                cover: 'slide_01_cover.svg'
            },
            {
                id: 'demo_project_intro_ppt169_20251211',
                title: 'PPT Master 공식 소개',
                pages: 10,
                style: 'creative',
                styleName: '청량한 테크 스타일',
                desc: 'PPT Master 프로젝트 공식 소개. 시스템 아키텍처와 4대 역할 협업 메커니즘을 보여줌.',
                tags: ['공식 소개', '인디고 그라데이션', '시스템 아키텍처'],
                isNew: false,
                cover: 'slide_01_cover.svg'
            }
        ];

        // Render projects
        function renderProjects(filter = 'all') {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';

            const filtered = filter === 'all'
                ? projects
                : projects.filter(p => p.style === filter);

            filtered.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => {
                    window.location.href = `viewer.html?project=${encodeURIComponent(project.id)}`;
                };

                const styleClass = project.style === 'consulting' ? 'style-consulting'
                    : project.style === 'general' ? 'style-general'
                        : 'style-creative';

                const coverUrl = encodeURI(`examples/${project.id}/svg_final/${project.cover}`);
                const img = document.createElement('img');
                img.src = coverUrl;
                img.alt = project.title;
                img.onerror = function () {
                    this.onerror = null;
                    this.parentElement.innerHTML = '<div class="placeholder">📊</div>';
                };

                card.innerHTML = `
                    <div class="card-preview">
                        ${project.isNew ? '<span class="card-badge new">🆕 신규</span>' : ''}
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${project.title}</h3>
                        <div class="card-meta">
                            <span>📄 ${project.pages} 페이지</span>
                            <span>🎨 ${project.styleName}</span>
                        </div>
                        <p class="card-desc">${project.desc}</p>
                        <div class="card-tags">
                            <span class="tag ${styleClass}">${project.styleName}</span>
                            ${project.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `;

                // Insert image into card-preview
                const preview = card.querySelector('.card-preview');
                preview.insertBefore(img, preview.firstChild);

                grid.appendChild(card);
            });
        }

        // Filter buttons
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProjects(btn.dataset.filter);
            });
        });

        // Initial render
        renderProjects();
    </script>
</body>
