<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-component="slide-frames/cover-band">
  <rect x="0" y="0" width="1280" height="720" fill="{colors.primary}"/>
  <rect x="0" y="600" width="1280" height="6" fill="{colors.brand-1}"/>
  <text x="80" y="280" font-family="{font.heading}" font-size="{typography.hero-display.size}" font-weight="{typography.hero-display.weight}" fill="{colors.ink-inverse}">{{text.title}}</text>
  <text x="80" y="380" font-family="{font.body}" font-size="{typography.heading-md.size}" font-weight="500" fill="{colors.ink-inverse}" fill-opacity="0.85">{{text.subtitle}}</text>
  <text x="80" y="660" font-family="{font.body}" font-size="{typography.body-md.size}" fill="{colors.ink-inverse}" fill-opacity="0.65">{{text.meta}}</text>
</svg>
