<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" data-component="callouts/quote-frame">
  <rect x="0" y="0" width="600" height="240" rx="{rounded.lg}" ry="{rounded.lg}" fill="{colors.surface-1}"/>
  <rect x="0" y="0" width="6" height="240" fill="{colors.brand-1}"/>
  <text x="40" y="80" font-family="{font.heading}" font-size="72" font-weight="700" fill="{colors.brand-1}" fill-opacity="0.4">&#8220;</text>
  <text x="80" y="120" font-family="{font.body}" font-size="{typography.heading-md.size}" font-weight="500" fill="{colors.ink}">{{text.quote}}</text>
  <text x="80" y="200" font-family="{font.body}" font-size="{typography.body-md.size}" fill="{colors.ink-muted}">{{text.attribution}}</text>
</svg>
