<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" data-component="product-cards/coral">
  <rect x="0" y="0" width="480" height="400" rx="{rounded.hero}" ry="{rounded.hero}" fill="{colors.brand-1}"/>
  <text x="32" y="92" font-family="{font.heading}" font-size="{typography.heading-xl.size}" font-weight="{typography.heading-xl.weight}" fill="{colors.ink-inverse}">{{text.title}}</text>
  <text x="32" y="148" font-family="{font.body}" font-size="{typography.heading-md.size}" font-weight="{typography.heading-md.weight}" fill="{colors.ink-inverse}" fill-opacity="0.92">{{text.subtitle}}</text>
  <text x="32" y="368" font-family="{font.body}" font-size="{typography.body-md.size}" fill="{colors.ink-inverse}" fill-opacity="0.85">{{text.footer}}</text>
</svg>
